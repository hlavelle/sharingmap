spring.profiles.include=prod

semantic.search.enabled=${SEMANTIC_SEARCH_ENABLED:false}
semantic.search.provider=${SEMANTIC_SEARCH_PROVIDER:yandex}
semantic.search.embedding-dim=${SEMANTIC_EMBEDDING_DIM:256}
semantic.search.reindex-on-startup=${SEMANTIC_REINDEX_ON_STARTUP:false}
semantic.search.max-distance=${SEMANTIC_SEARCH_MAX_DISTANCE:0.67}

yandex.ai.folder-id=${YANDEX_AI_FOLDER_ID:}
yandex.ai.api-key=${YANDEX_AI_API_KEY:}
yandex.ai.iam-token=${YANDEX_IAM_TOKEN:}
yandex.ai.doc-model-uri=${YANDEX_AI_DOC_MODEL_URI:emb://${YANDEX_AI_FOLDER_ID}/text-search-doc/latest}
yandex.ai.query-model-uri=${YANDEX_AI_QUERY_MODEL_URI:emb://${YANDEX_AI_FOLDER_ID}/text-search-query/latest}
